<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MHS & GWC Job Board</title>

<!-- ============================================================
     FILE: styles.css  (inlined here for preview)
     ============================================================ -->
<style>
/* ===== Reset & Base ===== */
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --primary: #4338ca;
  --primary-dark: #3730a3;
  --primary-light: #6366f1;
  --accent: #f59e0b;
  --bg: #f8fafc;
  --surface: #ffffff;
  --text: #0f172a;
  --text-muted: #64748b;
  --border: #e2e8f0;
  --success: #10b981;
  --danger: #ef4444;
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
  --shadow: 0 4px 6px -1px rgba(0,0,0,0.07), 0 2px 4px -1px rgba(0,0,0,0.04);
  --shadow-lg: 0 10px 25px -5px rgba(0,0,0,0.1), 0 8px 10px -6px rgba(0,0,0,0.05);
  --radius: 12px;
  --radius-sm: 8px;
}
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  min-height: 100vh;
}

/* ===== Header ===== */
header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: var(--shadow-sm);
}
.nav {
  max-width: 1200px;
  margin: 0 auto;
  padding: 1rem 1.5rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 1rem;
}
.logo {
  font-size: 1.5rem;
  font-weight: 800;
  color: var(--primary);
  letter-spacing: -0.5px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 0.5rem;
}
.logo-icon {
  width: 32px; height: 32px;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  border-radius: 8px;
  display: grid; place-items: center;
  color: white; font-size: 1.1rem;
}
.nav-links {
  display: flex;
  gap: 0.5rem;
  align-items: center;
}
.nav-btn {
  background: none;
  border: none;
  padding: 0.6rem 1rem;
  font-size: 0.95rem;
  font-weight: 500;
  color: var(--text-muted);
  cursor: pointer;
  border-radius: var(--radius-sm);
  transition: all 0.2s;
  font-family: inherit;
}
.nav-btn:hover { background: var(--bg); color: var(--text); }
.nav-btn.active { color: var(--primary); background: #eef2ff; }
.nav-btn.primary {
  background: var(--primary);
  color: white;
}
.nav-btn.primary:hover { background: var(--primary-dark); }

/* ===== Hero ===== */
.hero {
  background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
  color: white;
  padding: 4rem 1.5rem 3rem;
  text-align: center;
}
.hero h1 {
  font-size: clamp(1.8rem, 4vw, 2.75rem);
  font-weight: 800;
  margin-bottom: 0.75rem;
  letter-spacing: -1px;
}
.hero p {
  font-size: 1.1rem;
  opacity: 0.9;
  margin-bottom: 2rem;
  max-width: 600px;
  margin-left: auto; margin-right: auto;
}
.search-bar {
  max-width: 700px;
  margin: 0 auto;
  background: white;
  border-radius: var(--radius);
  padding: 0.5rem;
  display: flex;
  gap: 0.5rem;
  box-shadow: var(--shadow-lg);
}
.search-bar input {
  flex: 1;
  border: none;
  outline: none;
  padding: 0.85rem 1rem;
  font-size: 1rem;
  font-family: inherit;
  color: var(--text);
  background: transparent;
}
.search-bar button {
  background: var(--primary);
  color: white;
  border: none;
  padding: 0 1.5rem;
  border-radius: var(--radius-sm);
  font-weight: 600;
  cursor: pointer;
  font-family: inherit;
  transition: background 0.2s;
}
.search-bar button:hover { background: var(--primary-dark); }

/* ===== Main Layout ===== */
main {
  max-width: 1200px;
  margin: 0 auto;
  padding: 2.5rem 1.5rem;
}
.view { display: none; }
.view.active { display: block; animation: fadeIn 0.3s ease; }
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ===== Filters Bar ===== */
.filters {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1.25rem;
  margin-bottom: 1.5rem;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 1rem;
  align-items: end;
}
.filter-group { display: flex; flex-direction: column; gap: 0.4rem; }
.filter-group label {
  font-size: 0.8rem;
  font-weight: 600;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.filter-group select, .filter-group input {
  padding: 0.6rem 0.75rem;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  font-size: 0.95rem;
  font-family: inherit;
  background: white;
  color: var(--text);
  cursor: pointer;
  transition: border-color 0.2s;
}
.filter-group select:focus, .filter-group input:focus {
  outline: none;
  border-color: var(--primary);
}

/* ===== Results Header ===== */
.results-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 1.25rem;
  flex-wrap: wrap;
  gap: 1rem;
}
.results-count {
  font-size: 1.1rem;
  font-weight: 600;
}
.results-count span { color: var(--primary); }

/* ===== Job Cards ===== */
.jobs-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 1.25rem;
}
.job-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1.5rem;
  cursor: pointer;
  transition: all 0.25s ease;
  position: relative;
  display: flex;
  flex-direction: column;
  gap: 0.75rem;
}
.job-card:hover {
  transform: translateY(-3px);
  box-shadow: var(--shadow-lg);
  border-color: var(--primary-light);
}
.job-card-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 0.5rem;
}
.company-logo {
  width: 48px; height: 48px;
  border-radius: 10px;
  display: grid; place-items: center;
  font-weight: 700;
  font-size: 1.2rem;
  color: white;
  flex-shrink: 0;
}
.job-title {
  font-size: 1.15rem;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 0.2rem;
  line-height: 1.3;
}
.job-company {
  font-size: 0.9rem;
  color: var(--text-muted);
  font-weight: 500;
}
.bookmark-btn {
  background: none;
  border: none;
  cursor: pointer;
  padding: 0.4rem;
  border-radius: 50%;
  color: var(--text-muted);
  transition: all 0.2s;
  font-size: 1.2rem;
}
.bookmark-btn:hover { background: #fef3c7; color: var(--accent); }
.bookmark-btn.saved { color: var(--accent); }
.job-meta {
  display: flex;
  flex-wrap: wrap;
  gap: 0.5rem;
  font-size: 0.85rem;
  color: var(--text-muted);
}
.job-meta-item {
  display: flex;
  align-items: center;
  gap: 0.3rem;
}
.job-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 0.4rem;
  margin-top: 0.25rem;
}
.tag {
  background: #eef2ff;
  color: var(--primary);
  padding: 0.25rem 0.7rem;
  border-radius: 20px;
  font-size: 0.75rem;
  font-weight: 600;
}
.tag.type { background: #f0fdf4; color: var(--success); }
.tag.remote { background: #fef3c7; color: #b45309; }
.job-salary {
  font-weight: 700;
  color: var(--text);
  font-size: 0.95rem;
  margin-top: 0.25rem;
}
.job-posted {
  font-size: 0.8rem;
  color: var(--text-muted);
  margin-top: auto;
  padding-top: 0.5rem;
  border-top: 1px solid var(--border);
}

/* ===== Empty State ===== */
.empty-state {
  text-align: center;
  padding: 4rem 1rem;
  color: var(--text-muted);
}
.empty-state h3 {
  color: var(--text);
  margin-bottom: 0.5rem;
}

/* ===== Modal ===== */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(15, 23, 42, 0.6);
  backdrop-filter: blur(4px);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 1000;
  padding: 1rem;
  animation: fadeIn 0.2s ease;
}
.modal-overlay.active { display: flex; }
.modal {
  background: var(--surface);
  border-radius: var(--radius);
  max-width: 700px;
  width: 100%;
  max-height: 90vh;
  overflow-y: auto;
  box-shadow: var(--shadow-lg);
  animation: slideUp 0.3s ease;
}
@keyframes slideUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}
.modal-header {
  padding: 1.5rem;
  border-bottom: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 1rem;
}
.modal-close {
  background: none; border: none;
  font-size: 1.5rem;
  cursor: pointer;
  color: var(--text-muted);
  padding: 0.25rem 0.6rem;
  border-radius: 50%;
  transition: background 0.2s;
}
.modal-close:hover { background: var(--bg); }
.modal-body { padding: 1.5rem; }
.modal-footer {
  padding: 1.25rem 1.5rem;
  border-top: 1px solid var(--border);
  display: flex;
  gap: 0.75rem;
  justify-content: flex-end;
}

/* ===== Job Detail Modal ===== */
.detail-header {
  display: flex;
  gap: 1rem;
  align-items: flex-start;
  margin-bottom: 1rem;
}
.detail-title { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.3rem; }
.detail-company { color: var(--text-muted); font-size: 1rem; }
.detail-meta {
  display: flex;
  flex-wrap: wrap;
  gap: 1rem;
  padding: 1rem;
  background: var(--bg);
  border-radius: var(--radius-sm);
  margin-bottom: 1.5rem;
  font-size: 0.9rem;
}
.detail-meta strong { display: block; color: var(--text-muted); font-size: 0.75rem; text-transform: uppercase; margin-bottom: 0.2rem; }
.detail-section { margin-bottom: 1.5rem; }
.detail-section h3 {
  font-size: 1.05rem;
  margin-bottom: 0.6rem;
  color: var(--text);
}
.detail-section p, .detail-section li {
  color: var(--text-muted);
  font-size: 0.95rem;
}
.detail-section ul { padding-left: 1.25rem; }
.detail-section li { margin-bottom: 0.3rem; }

/* ===== Forms ===== */
.form-group { margin-bottom: 1.1rem; }
.form-group label {
  display: block;
  font-size: 0.9rem;
  font-weight: 600;
  margin-bottom: 0.4rem;
  color: var(--text);
}
.form-group input, .form-group select, .form-group textarea {
  width: 100%;
  padding: 0.7rem 0.9rem;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  font-size: 0.95rem;
  font-family: inherit;
  color: var(--text);
  background: white;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.form-group input:focus, .form-group select:focus, .form-group textarea:focus {
  outline: none;
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(67, 56, 202, 0.1);
}
.form-group textarea { resize: vertical; min-height: 100px; }
.form-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0.75rem;
}

/* ===== Buttons ===== */
.btn {
  padding: 0.7rem 1.4rem;
  border: none;
  border-radius: var(--radius-sm);
  font-size: 0.95rem;
  font-weight: 600;
  cursor: pointer;
  font-family: inherit;
  transition: all 0.2s;
}
.btn-primary {
  background: var(--primary);
  color: white;
}
.btn-primary:hover { background: var(--primary-dark); transform: translateY(-1px); }
.btn-secondary {
  background: var(--bg);
  color: var(--text);
  border: 1px solid var(--border);
}
.btn-secondary:hover { background: var(--border); }

/* ===== Passkey Modal ===== */
.passkey-modal { max-width: 420px; }
.passkey-icon {
  width: 64px; height: 64px;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  border-radius: 50%;
  display: grid; place-items: center;
  margin: 0 auto 1rem;
  font-size: 1.8rem;
  color: white;
}
.passkey-modal .modal-body { text-align: center; padding: 2rem 1.5rem; }
.passkey-modal h2 { margin-bottom: 0.5rem; }
.passkey-modal p { color: var(--text-muted); margin-bottom: 1.5rem; font-size: 0.95rem; }
.passkey-input {
  width: 100%;
  padding: 0.85rem 1rem;
  border: 2px solid var(--border);
  border-radius: var(--radius-sm);
  font-size: 1rem;
  font-family: inherit;
  text-align: center;
  letter-spacing: 1px;
  transition: border-color 0.2s;
}
.passkey-input:focus {
  outline: none;
  border-color: var(--primary);
}
.passkey-error {
  color: var(--danger);
  font-size: 0.85rem;
  margin-top: 0.6rem;
  min-height: 1.2rem;
}
.shake { animation: shake 0.4s; }
@keyframes shake {
  0%, 100% { transform: translateX(0); }
  20%, 60% { transform: translateX(-8px); }
  40%, 80% { transform: translateX(8px); }
}
.success-badge {
  background: #d1fae5;
  color: #065f46;
  padding: 0.5rem 1rem;
  border-radius: var(--radius-sm);
  font-size: 0.9rem;
  font-weight: 600;
  display: inline-block;
  margin-bottom: 1rem;
}

/* ===== Toast ===== */
.toast {
  position: fixed;
  bottom: 2rem;
  right: 2rem;
  background: var(--text);
  color: white;
  padding: 0.9rem 1.3rem;
  border-radius: var(--radius-sm);
  box-shadow: var(--shadow-lg);
  z-index: 2000;
  opacity: 0;
  transform: translateY(20px);
  transition: all 0.3s;
  font-weight: 500;
  font-size: 0.95rem;
}
.toast.show { opacity: 1; transform: translateY(0); }
.toast.success { background: var(--success); }
.toast.error { background: var(--danger); }

/* ===== Responsive ===== */
@media (max-width: 640px) {
  .hero { padding: 2.5rem 1rem 2rem; }
  .search-bar { flex-direction: column; padding: 0.75rem; }
  .search-bar button { padding: 0.75rem; }
  .nav { padding: 0.75rem 1rem; }
  .nav-btn { padding: 0.5rem 0.75rem; font-size: 0.85rem; }
  .logo { font-size: 1.2rem; }
  main { padding: 1.5rem 1rem; }
  .form-row { grid-template-columns: 1fr; }
  .toast { left: 1rem; right: 1rem; bottom: 1rem; }
}
</style>
</head>
<body>

<!-- ============================================================
     FILE: index.html  (structure)
     ============================================================ -->
<header>
  <nav class="nav">
    <div class="logo" onclick="switchView('listings')">
      <div class="logo-icon">GWC</div>
      Teen Jobs
    </div>
    <div class="nav-links">
      <button class="nav-btn active" id="nav-listings" onclick="switchView('listings')">Browse Jobs</button>
      <button class="nav-btn" id="nav-saved" onclick="switchView('saved')">Saved <span id="saved-count"></span></button>
      <button class="nav-btn primary" onclick="openPostJob()">Post a Job</button>
    </div>
  </nav>
</header>

<!-- LISTINGS VIEW -->
<div class="view active" id="view-listings">
  <section class="hero">
    <h1>Find Your Next Opportunity</h1>
    <p>Local companies hiring teens like you! Apply today and start learning job skills.</p>
    <div class="search-bar">
      <input type="text" id="search-input" placeholder="Search by title, company, or keyword..." />
      <button onclick="applyFilters()">Search</button>
    </div>
  </section>

  <main>
    <div class="filters">
      <div class="filter-group">
        <label>Category</label>
        <select id="filter-category">
          <option value="">All Categories</option>
          <option>Engineering</option>
          <option>Design</option>
          <option>Marketing</option>
          <option>Sales</option>
          <option>Product</option>
          <option>Data</option>
          <option>Operations</option>
          <option>Finance</option>
        </select>
      </div>
      <div class="filter-group">
        <label>Job Type</label>
        <select id="filter-type">
          <option value="">All Types</option>
          <option>Full-time</option>
          <option>Part-time</option>
          <option>Contract</option>
          <option>Remote</option>
        </select>
      </div>
      <div class="filter-group">
        <label>Location</label>
        <input type="text" id="filter-location" placeholder="Any location" />
      </div>
      <div class="filter-group">
        <label>Sort By</label>
        <select id="filter-sort">
          <option value="newest">Newest First</option>
          <option value="oldest">Oldest First</option>
          <option value="salary">Highest Salary</option>
        </select>
      </div>
    </div>

    <div class="results-header">
      <div class="results-count"><span id="job-count">0</span> jobs found</div>
    </div>

    <div class="jobs-grid" id="jobs-grid"></div>
  </main>
</div>

<!-- SAVED VIEW -->
<div class="view" id="view-saved">
  <main>
    <div class="results-header">
      <h2>Saved Jobs</h2>
    </div>
    <div class="jobs-grid" id="saved-grid"></div>
  </main>
</div>

<!-- MODALS -->
<div class="modal-overlay" id="modal-detail">
  <div class="modal">
    <div class="modal-header">
      <div style="flex:1"></div>
      <button class="modal-close" onclick="closeModal('modal-detail')">&times;</button>
    </div>
    <div class="modal-body" id="detail-body"></div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('modal-detail')">Close</button>
      <button class="btn btn-primary" id="detail-apply-btn">Apply Now</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-passkey">
  <div class="modal passkey-modal">
    <div class="modal-body">
      <div class="passkey-icon">🔐</div>
      <h2>Employer Access Required</h2>
      <p>Enter the employer passkey to post a new job listing.</p>
      <input type="password" class="passkey-input" id="passkey-input" placeholder="Enter passkey" autocomplete="off" />
      <div class="passkey-error" id="passkey-error"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('modal-passkey')">Cancel</button>
      <button class="btn btn-primary" onclick="verifyPasskey()">Unlock</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-post">
  <div class="modal">
    <div class="modal-header">
      <div>
        <h2>Post a New Job</h2>
        <div class="success-badge" style="margin-top:0.5rem">✓ Verified Employer</div>
      </div>
      <button class="modal-close" onclick="closeModal('modal-post')">&times;</button>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <div class="form-group">
          <label>Job Title *</label>
          <input type="text" id="post-title" placeholder="Senior Frontend Engineer" />
        </div>
        <div class="form-group">
          <label>Company *</label>
          <input type="text" id="post-company" placeholder="Acme Inc." />
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Location *</label>
          <input type="text" id="post-location" placeholder="San Francisco, CA" />
        </div>
        <div class="form-group">
          <label>Job Type *</label>
          <select id="post-type">
            <option>Full-time</option>
            <option>Part-time</option>
            <option>Contract</option>
            <option>Remote</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Category *</label>
          <select id="post-category">
            <option>Engineering</option>
            <option>Design</option>
            <option>Marketing</option>
            <option>Sales</option>
            <option>Product</option>
            <option>Data</option>
            <option>Operations</option>
            <option>Finance</option>
          </select>
        </div>
        <div class="form-group">
          <label>Salary Range *</label>
          <input type="text" id="post-salary" placeholder="$80k – $120k" />
        </div>
      </div>
      <div class="form-group">
        <label>Description *</label>
        <textarea id="post-description" placeholder="Describe the role..."></textarea>
      </div>
      <div class="form-group">
        <label>Requirements (one per line)</label>
        <textarea id="post-requirements" placeholder="5+ years experience&#10;Strong communication skills"></textarea>
      </div>
      <div class="form-group">
        <label>Tags (comma separated)</label>
        <input type="text" id="post-tags" placeholder="React, TypeScript, Remote-friendly" />
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('modal-post')">Cancel</button>
      <button class="btn btn-primary" onclick="submitJob()">Publish Job</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-apply">
  <div class="modal">
    <div class="modal-header">
      <h2 id="apply-job-title">Apply for Position</h2>
      <button class="modal-close" onclick="closeModal('modal-apply')">&times;</button>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <div class="form-group">
          <label>Full Name *</label>
          <input type="text" id="apply-name" />
        </div>
        <div class="form-group">
          <label>Email *</label>
          <input type="email" id="apply-email" />
        </div>
      </div>
      <div class="form-group">

let jobs = [];
let savedJobs = new Set();

// ===== Sheets API =====
async function loadJobsFromSheet() {
  try {
    const res = await fetch(`${SHEETS_API}?action=listJobs`);
    const data = await res.json();
    if (!data.ok) throw new Error(data.error || 'Failed to load jobs');
    if (Array.isArray(data.jobs) && data.jobs.length > 0) {
      jobs = data.jobs;
    } else {
      // Sheet is empty — fall back to sample data so the board isn't blank
      jobs = [...sampleJobs];
    }
  } catch (err) {
    console.warn('Could not reach sheet, using sample data:', err);
    jobs = [...sampleJobs];
    showToast('Using offline samples — sheet unreachable', 'error');
  }
  applyFilters();
}

// ===== Rendering =====
function getInitials(name) {
  return name.split(' ').map(w => w[0]).slice(0, 2).join('').toUpperCase();
}

function formatPosted(days) {
  if (days === 0) return 'Posted today';
  if (days === 1) return 'Posted 1 day ago';
  if (days < 7) return `Posted ${days} days ago`;
  if (days < 14) return 'Posted 1 week ago';
  if (days < 30) return `Posted ${Math.floor(days / 7)} weeks ago`;
  return `Posted ${Math.floor(days / 30)} month(s) ago`;
}

function renderJobs(list, container) {
  const grid = document.getElementById(container);
  if (list.length === 0) {
    grid.innerHTML = `
      <div class="empty-state" style="grid-column:1/-1">
        <h3>No jobs found</h3>
        <p>Try adjusting your filters or search terms.</p>
      </div>`;
    return;
  }
  grid.innerHTML = list.map(job => `
    <div class="job-card" onclick="openJobDetail(${job.id})">
      <div class="job-card-header">
        <div style="display:flex; gap:0.85rem; align-items:flex-start; flex:1">
          <div class="company-logo" style="background:${job.logo}">${getInitials(job.company)}</div>
          <div style="min-width:0">
            <div class="job-title">${escapeHtml(job.title)}</div>
            <div class="job-company">${escapeHtml(job.company)}</div>
          </div>
        </div>
        <button class="bookmark-btn ${savedJobs.has(job.id) ? 'saved' : ''}"
                onclick="event.stopPropagation(); toggleSave(${job.id})"
                title="Save job">
          ${savedJobs.has(job.id) ? '★' : '☆'}
        </button>
      </div>
      <div class="job-meta">
        <span class="job-meta-item">📍 ${escapeHtml(job.location)}</span>
      </div>
      <div class="job-tags">
        <span class="tag type">${escapeHtml(job.type)}</span>
        ${job.type === 'Remote' ? '' : ''}
        ${job.tags.slice(0, 3).map(t => `<span class="tag">${escapeHtml(t)}</span>`).join('')}
      </div>
      <div class="job-salary">💰 ${escapeHtml(job.salary)}</div>
      <div class="job-posted">${formatPosted(job.posted)}</div>
    </div>
  `).join('');
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// ===== Filtering =====
function applyFilters() {
  const search = document.getElementById('search-input').value.toLowerCase().trim();
  const category = document.getElementById('filter-category').value;
  const type = document.getElementById('filter-type').value;
  const location = document.getElementById('filter-location').value.toLowerCase().trim();
  const sort = document.getElementById('filter-sort').value;

  let filtered = jobs.filter(j => {
    if (search && !(`${j.title} ${j.company} ${j.description} ${j.tags.join(' ')}`.toLowerCase().includes(search))) return false;
    if (category && j.category !== category) return false;
    if (type && j.type !== type) return false;
    if (location && !j.location.toLowerCase().includes(location)) return false;
    return true;
  });

  if (sort === 'newest') filtered.sort((a, b) => a.posted - b.posted);
  else if (sort === 'oldest') filtered.sort((a, b) => b.posted - a.posted);
  else if (sort === 'salary') filtered.sort((a, b) => b.salaryNum - a.salaryNum);

  document.getElementById('job-count').textContent = filtered.length;
  renderJobs(filtered, 'jobs-grid');
}

// ===== Save/Bookmark =====
function toggleSave(id) {
  if (savedJobs.has(id)) {
    savedJobs.delete(id);
    showToast('Removed from saved jobs');
  } else {
    savedJobs.add(id);
    showToast('Saved! Find it in your saved list.', 'success');
  }
  applyFilters();
  renderSaved();
  updateSavedCount();
}

function renderSaved() {
  const list = jobs.filter(j => savedJobs.has(j.id));
  if (list.length === 0) {
    document.getElementById('saved-grid').innerHTML = `
      <div class="empty-state" style="grid-column:1/-1">
        <h3>No saved jobs yet</h3>
        <p>Click the star icon on any job to save it for later.</p>
      </div>`;
    return;
  }
  renderJobs(list, 'saved-grid');
}

function updateSavedCount() {
  const el = document.getElementById('saved-count');
  el.textContent = savedJobs.size > 0 ? `(${savedJobs.size})` : '';
}

// ===== Views =====
function switchView(view) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  if (view === 'listings') {
    document.getElementById('view-listings').classList.add('active');
    document.getElementById('nav-listings').classList.add('active');
  } else {
    document.getElementById('view-saved').classList.add('active');
    document.getElementById('nav-saved').classList.add('active');
    renderSaved();
  }
}

// ===== Detail Modal =====
function openJobDetail(id) {
  const job = jobs.find(j => j.id === id);
  if (!job) return;
  currentDetailJobId = id;
  document.getElementById('detail-body').innerHTML = `
    <div class="detail-header">
      <div class="company-logo" style="background:${job.logo}; width:60px; height:60px; font-size:1.4rem">${getInitials(job.company)}</div>
      <div style="flex:1">
        <div class="detail-title">${escapeHtml(job.title)}</div>
        <div class="detail-company">${escapeHtml(job.company)}</div>
      </div>
      <button class="bookmark-btn ${savedJobs.has(job.id) ? 'saved' : ''}"
              onclick="toggleSave(${job.id}); openJobDetail(${job.id})"
              style="font-size:1.5rem">
        ${savedJobs.has(job.id) ? '★' : '☆'}
      </button>
    </div>
    <div class="detail-meta">
      <div><strong>Location</strong>${escapeHtml(job.location)}</div>
      <div><strong>Type</strong>${escapeHtml(job.type)}</div>
      <div><strong>Category</strong>${escapeHtml(job.category)}</div>
      <div><strong>Salary</strong>${escapeHtml(job.salary)}</div>
      <div><strong>Posted</strong>${formatPosted(job.posted)}</div>
    </div>
    <div class="detail-section">
      <h3>About the Role</h3>
      <p>${escapeHtml(job.description)}</p>
    </div>
    <div class="detail-section">
      <h3>Requirements</h3>
      <ul>${job.requirements.map(r => `<li>${escapeHtml(r)}</li>`).join('')}</ul>
    </div>
    <div class="detail-section">
      <h3>Skills & Tags</h3>
      <div class="job-tags">
        ${job.tags.map(t => `<span class="tag">${escapeHtml(t)}</span>`).join('')}
      </div>
    </div>
  `;
  document.getElementById('detail-apply-btn').onclick = () => {
    closeModal('modal-detail');
    openApply(job);
  };
  openModal('modal-detail');
}

// ===== Apply =====
function openApply(job) {
  document.getElementById('apply-job-title').textContent = `Apply for ${job.title}`;
  document.getElementById('apply-name').value = '';
  document.getElementById('apply-email').value = '';
  document.getElementById('apply-resume').value = '';
  document.getElementById('apply-cover').value = '';
  openModal('modal-apply');
}

function submitApplication() {
  const name = document.getElementById('apply-name').value.trim();
  const email = document.getElementById('apply-email').value.trim();
  const resume = document.getElementById('apply-resume').value.trim();
  const cover = document.getElementById('apply-cover').value.trim();
  if (!name || !email) {
    showToast('Please fill in your name and email', 'error');
    return;
  }
  if (!email.includes('@')) {
    showToast('Please enter a valid email', 'error');
    return;
  }

  const job = jobs.find(j => j.id === currentDetailJobId);
  const application = {
    job_id: currentDetailJobId,
    job_title: job ? job.title : '',
    company: job ? job.company : '',
    applicant_name: name,
    applicant_email: email,
    resume_url: resume,
    cover_letter: cover
  };

  showToast('Submitting application…');

  // Primary: Google Sheet (Apps Script uses text/plain to avoid a CORS preflight)
  const sheetReq = fetch(SHEETS_API, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify({ action: 'createApplication', application })
  }).then(r => r.json());

  // Backup: Formspree email
  const emailReq = fetch(FORMSPREE_APPLICATIONS, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
    body: JSON.stringify({
      _subject: `New application: ${application.job_title} @ ${application.company}`,
      ...application,
      submitted_at: new Date().toISOString()
    })
  });

  sheetReq
    .then(data => {
      if (!data.ok) throw new Error(data.error || 'Sheet write failed');
      closeModal('modal-apply');
      showToast('Application submitted! Good luck 🎉', 'success');
    })
    .catch(err => {
      console.error(err);
      showToast('Could not submit — please try again', 'error');
    });

  // Email backup is fire-and-forget; log failures but don't bother the user
  emailReq.catch(e => console.warn('Formspree backup failed:', e));
}

// ===== Passkey & Post Job =====
function openPostJob() {
  if (isEmployerVerified) {
    openModal('modal-post');
  } else {
    document.getElementById('passkey-input').value = '';
    document.getElementById('passkey-error').textContent = '';
    openModal('modal-passkey');
    setTimeout(() => document.getElementById('passkey-input').focus(), 100);
  }
}

function verifyPasskey() {
  const input = document.getElementById('passkey-input');
  const error = document.getElementById('passkey-error');
  const modal = document.querySelector('#modal-passkey .modal');
  if (input.value === EMPLOYER_PASSKEY) {
    isEmployerVerified = true;
    closeModal('modal-passkey');
    showToast('Access granted ✓', 'success');
    setTimeout(() => openModal('modal-post'), 250);
  } else {
    error.textContent = 'Incorrect passkey. Please try again.';
    modal.classList.add('shake');
    setTimeout(() => modal.classList.remove('shake'), 400);
    input.select();
  }
}

function submitJob() {
  const title = document.getElementById('post-title').value.trim();
  const company = document.getElementById('post-company').value.trim();
  const location = document.getElementById('post-location').value.trim();
  const type = document.getElementById('post-type').value;
  const category = document.getElementById('post-category').value;
  const salary = document.getElementById('post-salary').value.trim();
  const description = document.getElementById('post-description').value.trim();
  const requirements = document.getElementById('post-requirements').value.trim().split('\n').filter(Boolean);
  const tags = document.getElementById('post-tags').value.split(',').map(t => t.trim()).filter(Boolean);

  if (!title || !company || !location || !salary || !description) {
    showToast('Please fill in all required fields', 'error');
    return;
  }

  const salaryNum = parseInt(salary.replace(/[^0-9]/g, '').slice(0, 6)) || 50000;

  const jobPayload = {
    title, company, location, type, category, salary, salaryNum,
    description,
    requirements: requirements.length ? requirements : ['See description above'],
    tags: tags.length ? tags : [category]
  };

  showToast('Publishing job…');

  // Primary: Google Sheet
  const sheetReq = fetch(SHEETS_API, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify({
      action: 'createJob',
      passkey: EMPLOYER_PASSKEY,
      job: jobPayload
    })
  }).then(r => r.json());

  // Backup: Formspree email
  const emailReq = fetch(FORMSPREE_POSTINGS, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
    body: JSON.stringify({
      _subject: `New job posted: ${title} @ ${company}`,
      title, company, location, type, category, salary,
      description,
      requirements: jobPayload.requirements.join('\n'),
      tags: jobPayload.tags.join(', '),
      submitted_at: new Date().toISOString()
    })
  });

  sheetReq
    .then(data => {
      if (!data.ok) throw new Error(data.error || 'Sheet write failed');
      // Add the newly-created job (with its real ID from the sheet) to the local list
      if (data.job) jobs.unshift(data.job);

      ['post-title','post-company','post-location','post-salary','post-description','post-requirements','post-tags']
        .forEach(id => document.getElementById(id).value = '');
      closeModal('modal-post');
      showToast('Job published successfully! 🎉', 'success');
      applyFilters();
    })
    .catch(err => {
      console.error(err);
      showToast('Could not publish — please try again', 'error');
    });

  emailReq.catch(e => console.warn('Formspree backup failed:', e));
}

// ===== Modal Helpers =====
function openModal(id) { document.getElementById(id).classList.add('active'); }
function closeModal(id) { document.getElementById(id).classList.remove('active'); }

// Close modal when clicking overlay
document.querySelectorAll('.modal-overlay').forEach(overlay => {
  overlay.addEventListener('click', (e) => {
    if (e.target === overlay) overlay.classList.remove('active');
  });
});

// Passkey input — submit on Enter
document.getElementById('passkey-input').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') verifyPasskey();
});

// Search input — submit on Enter
document.getElementById('search-input').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') applyFilters();
});

// Filter changes
['filter-category','filter-type','filter-location','filter-sort'].forEach(id => {
  document.getElementById(id).addEventListener('change', applyFilters);
  if (id === 'filter-location') {
    document.getElementById(id).addEventListener('input', applyFilters);
  }
});

// ===== Toast =====
function showToast(msg, type = '') {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.className = `toast show ${type}`;
  clearTimeout(toast._t);
  toast._t = setTimeout(() => { toast.className = `toast ${type}`; }, 3000);
}

// ===== Initial Render =====
loadJobsFromSheet();
updateSavedCount();
</script>
