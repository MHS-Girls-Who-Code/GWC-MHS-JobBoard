<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MHS & GWC Job Board</title>
<link rel="stylesheet" href="Style Sheet.css">
</head>
<body>

<header>
  <nav class="nav">
    <div class="logo" onclick="switchView('listings')">
      <div class="logo-icon">GWC</div>
      Club Positions
    </div>
    <div class="nav-links">
      <button class="nav-btn active" id="nav-listings" onclick="switchView('listings')">Browse Jobs</button>
      <button class="nav-btn" id="nav-saved" onclick="switchView('saved')">Saved <span id="saved-count"></span></button>
      <button class="nav-btn primary" onclick="openPostJob()">Post a Job</button>
    </div>
  </nav>
</header>

<!-- LISTINGS VIEW -->
<div class="view active" id="view-listings">
  <section class="hero">
    <h1>Find Your Next Opportunity</h1>
    <p>Local companies hiring teens like you! Apply today and start learning job skills.</p>
    <div class="search-bar">
      <input type="text" id="search-input" placeholder="Search by title, company, or keyword..." />
      <button onclick="applyFilters()">Search</button>
    </div>
  </section>

  <main>
    <div class="filters">
      <div class="filter-group">
        <label>Category</label>
        <select id="filter-category">
          <option value="">All Categories</option>
          <option>Honor Society</option>
          <option>STEM</option>
          <option>Art</option>
          <option>Academic</option>
          <option>Volunteering</option>
          <option>Social</option>
        </select>
      </div>
      <div class="filter-group">
        <label>Job Type</label>
        <select id="filter-type">
          <option value="">All Types</option>
          <option>President</option>
          <option>Vice President</option>
          <option>Treasurer</option>
          <option>Secretary</option>
          <option>Creative Director</option>
          <option>Member</option>
        </select>
      </div>
      <div class="filter-group">
        <label>Location</label>
        <input type="text" id="filter-location" placeholder="Any location" />
      </div>
      <div class="filter-group">
        <label>Sort By</label>
        <select id="filter-sort">
          <option value="newest">Newest First</option>
          <option value="oldest">Oldest First</option>
          <option value="salary">Highest Salary</option>
        </select>
      </div>
    </div>

    <div class="results-header">
      <div class="results-count"><span id="job-count">0</span> jobs found</div>
    </div>

    <div class="jobs-grid" id="jobs-grid"></div>
  </main>
</div>

<!-- SAVED VIEW -->
<div class="view" id="view-saved">
  <main>
    <div class="results-header">
      <h2>Saved Jobs</h2>
    </div>
    <div class="jobs-grid" id="saved-grid"></div>
  </main>
</div>

<!-- MODALS -->
<div class="modal-overlay" id="modal-detail">
  <div class="modal">
    <div class="modal-header">
      <div style="flex:1"></div>
      <button class="modal-close" onclick="closeModal('modal-detail')">&times;</button>
    </div>
    <div class="modal-body" id="detail-body"></div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('modal-detail')">Close</button>
      <button class="btn btn-primary" id="detail-apply-btn">Apply Now</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-passkey">
  <div class="modal passkey-modal">
    <div class="modal-body">
      <div class="passkey-icon">🔐</div>
      <h2>Employer Access Required</h2>
      <p>Enter the employer passkey to post a new job listing.</p>
      <input type="password" class="passkey-input" id="passkey-input" placeholder="Enter passkey" autocomplete="off" />
      <div class="passkey-error" id="passkey-error"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('modal-passkey')">Cancel</button>
      <button class="btn btn-primary" onclick="verifyPasskey()">Unlock</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-post">
  <div class="modal">
    <div class="modal-header">
      <div>
        <h2>Post a New Job</h2>
        <div class="success-badge" style="margin-top:0.5rem">✓ Verified Employer</div>
      </div>
      <button class="modal-close" onclick="closeModal('modal-post')">&times;</button>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <div class="form-group">
          <label>Job Title *</label>
          <input type="text" id="post-title" placeholder="Senior Frontend Engineer" maxlength="500" />
        </div>
        <div class="form-group">
          <label>Company *</label>
          <input type="text" id="post-company" placeholder="Acme Inc." maxlength="200" />
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Location *</label>
          <input type="text" id="post-location" placeholder="San Francisco, CA" maxlength="200" />
        </div>
        <div class="form-group">
          <label>Job Type *</label>
          <select id="post-type">
            <option>Full-time</option>
            <option>Part-time</option>
            <option>Contract</option>
            <option>Remote</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Category *</label>
          <select id="post-category">
            <option>Engineering</option>
            <option>Design</option>
            <option>Marketing</option>
            <option>Sales</option>
            <option>Product</option>
            <option>Data</option>
            <option>Operations</option>
            <option>Finance</option>
          </select>
        </div>
        <div class="form-group">
          <label>Salary Range *</label>
          <input type="text" id="post-salary" placeholder="$80k – $120k" maxlength="200" />
        </div>
      </div>
      <div class="form-group">
        <label>Description *</label>
        <textarea id="post-description" placeholder="Describe the role..." maxlength="5000"></textarea>
      </div>
      <div class="form-group">
        <label>Requirements (one per line)</label>
        <textarea id="post-requirements" placeholder="5+ years experience&#10;Strong communication skills" maxlength="5000"></textarea>
      </div>
      <div class="form-group">
        <label>Tags (comma separated)</label>
        <input type="text" id="post-tags" placeholder="React, TypeScript, Remote-friendly" maxlength="200" />
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('modal-post')">Cancel</button>
      <button class="btn btn-primary" onclick="submitJob()">Publish Job</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-apply">
  <div class="modal">
    <div class="modal-header">
      <h2 id="apply-job-title">Apply for Position</h2>
      <button class="modal-close" onclick="closeModal('modal-apply')">&times;</button>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <div class="form-group">
          <label>Full Name *</label>
          <input type="text" id="apply-name" maxlength="200" />
        </div>
        <div class="form-group">
          <label>Email *</label>
          <input type="email" id="apply-email" maxlength="200" />
        </div>
      </div>
      <div class="form-group">
        <label>Resume/Portfolio URL</label>
        <input type="url" id="apply-resume" placeholder="https://..." maxlength="500" />
      </div>
      <div class="form-group">
        <label>Cover Letter</label>
        <textarea id="apply-cover" placeholder="Tell us why you're a great fit..." maxlength="5000"></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('modal-apply')">Cancel</button>
      <button class="btn btn-primary" onclick="submitApplication()">Submit Application</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="Script Sheet.js"></script>
</body>
</html>
